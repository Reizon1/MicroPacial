<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- PANTALLA INICIO -->
<div class="screen active" id="startScreen">

<h1>TIC TAC TOE</h1>

<button id="startBtn">JUGAR</button>

</div>


<!-- PANTALLA JUEGO -->
<div class="screen" id="gameScreen">

<h2>TIC TAC TOE</h2>

<p id="turn">TURNO DEL JUGADOR: X</p>

<div class="board">

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

</div>

</div>


<!-- PANTALLA GANADOR -->
<div class="winner" id="winnerBox">

<div class="winner-content">

<h3 id="winnerText"></h3>

<button id="restartBtn">Jugar otra vez</button>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
